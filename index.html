<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xolo · Créditos Diarios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #05060a;
  --bg-1: #0a0d14;
  --bg-glass: rgba(18, 22, 34, 0.55);
  --bg-glass-strong: rgba(22, 28, 44, 0.72);
  --bg-glass-hover: rgba(28, 36, 56, 0.75);
  --border-glass: rgba(255, 255, 255, 0.08);
  --border-glass-strong: rgba(255, 255, 255, 0.14);
  --ink: #e8ecf4;
  --ink-2: #a8b0c4;
  --muted: #6a7390;
  --accent: #7c5cff;
  --accent-2: #22d3ee;
  --accent-glow: rgba(124, 92, 255, 0.45);
  --green: #10b981;
  --rose: #f43f5e;
  --gold: #fbbf24;
  --font-sans: 'Space Grotesk', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--bg-0); color: var(--ink); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
body { min-height: 100vh; position: relative; }

body::before, body::after {
  content: "";
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.5;
  z-index: 0;
  pointer-events: none;
  animation: drift 20s ease-in-out infinite alternate;
}
body::before {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #7c5cff 0%, transparent 70%);
  top: -200px; left: -150px;
}
body::after {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #22d3ee 0%, transparent 70%);
  bottom: -200px; right: -100px;
  animation-delay: -10s;
}
@keyframes drift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(60px, 40px) scale(1.1); }
}

.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
}

.wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  position: relative;
  z-index: 2;
}

.glass {
  background: var(--bg-glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--border-glass);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.masthead {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 1.75rem;
  margin-bottom: 1.5rem;
  gap: 2rem; flex-wrap: wrap;
}
.title-block { flex: 1 1 400px; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: .7rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .6rem;
  display: flex; align-items: center; gap: .6rem;
}
.eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
h1 {
  font-family: var(--font-sans);
  font-size: clamp(1.6rem, 3.5vw, 2.2rem);
  font-weight: 600;
  letter-spacing: -.02em;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 0%, #a8b0c4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
h1 em {
  font-style: normal;
  font-weight: 700;
  background: linear-gradient(135deg, #7c5cff 0%, #22d3ee 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sub {
  font-size: .9rem;
  color: var(--ink-2);
  margin-top: .5rem;
  max-width: 58ch;
  line-height: 1.5;
}
.sub code {
  font-family: var(--font-mono);
  font-size: .85em;
  padding: .1rem .4rem;
  background: rgba(255,255,255,.06);
  border-radius: 4px;
  color: var(--accent-2);
}
.meta-block {
  display: flex; flex-direction: column; align-items: flex-end; gap: .5rem;
}
.status {
  display: inline-flex; align-items: center; gap: .55rem;
  padding: .45rem .9rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border-glass);
  border-radius: 999px;
  font-size: .75rem;
  font-family: var(--font-mono);
  color: var(--ink-2);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px currentColor; color: var(--green); }
.dot.load { background: var(--gold); color: var(--gold); animation: pulse 1s infinite; }
.dot.err { background: var(--rose); color: var(--rose); }
@keyframes pulse { 50% { opacity: .3; } }
#dateRangeLabel {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--muted);
}

.controls {
  display: flex; flex-wrap: wrap; gap: 1rem;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
  align-items: flex-end;
}
.ctrl { display: flex; flex-direction: column; gap: .4rem; }
.ctrl label {
  font-family: var(--font-mono);
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}
.ctrl input, .ctrl select {
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border-glass);
  padding: .6rem .85rem;
  font-family: var(--font-sans);
  font-size: .88rem;
  color: var(--ink);
  border-radius: 10px;
  min-width: 150px;
  transition: all .2s;
  backdrop-filter: blur(10px);
}
.ctrl input:focus, .ctrl select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: rgba(255,255,255,.06);
}
.ctrl input::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.55); cursor: pointer; }
.ctrl select option { background: var(--bg-1); color: var(--ink); }
.spacer { flex: 1; min-width: 1rem; }
.btn {
  padding: .7rem 1.5rem;
  border: 1px solid transparent;
  font-family: var(--font-sans);
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 10px;
  transition: all .2s;
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, #7c5cff 0%, #5b3fd8 100%);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: rgba(255,255,255,.04);
  color: var(--ink);
  border: 1px solid var(--border-glass);
  backdrop-filter: blur(10px);
}
.btn-ghost:hover { border-color: var(--accent); background: rgba(255,255,255,.07); }

.tabs-container {
  position: sticky; top: 1rem;
  z-index: 50;
  margin-bottom: 1.5rem;
  padding: .5rem;
}
.tabs {
  display: flex; gap: .3rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: .65rem 1.1rem;
  background: transparent;
  border: 1px solid transparent;
  font-family: var(--font-sans);
  font-size: .82rem;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  font-variant-numeric: tabular-nums;
  border-radius: 10px;
  display: inline-flex; align-items: center; gap: .5rem;
}
.tab:hover {
  color: var(--ink);
  background: rgba(255,255,255,.04);
  border-color: var(--border-glass);
}
.tab.active {
  color: #fff;
  background: linear-gradient(135deg, rgba(124,92,255,.25) 0%, rgba(34,211,238,.15) 100%);
  border-color: rgba(124,92,255,.4);
  box-shadow: 0 0 20px rgba(124,92,255,.2), inset 0 1px 0 rgba(255,255,255,.08);
}
.tab-label {
  font-size: .68rem;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: .06em;
  padding: .15rem .4rem;
  background: rgba(255,255,255,.05);
  border-radius: 4px;
}
.tab.active .tab-label {
  background: rgba(124,92,255,.3);
  color: #fff;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.stat {
  padding: 1.4rem 1.5rem;
  position: relative;
  overflow: hidden;
  transition: transform .2s, border-color .2s;
}
.stat:hover {
  transform: translateY(-2px);
  border-color: var(--border-glass-strong);
}
.stat::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
}
.stat-label {
  font-family: var(--font-mono);
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .7rem;
  display: flex; align-items: center; gap: .5rem;
}
.stat-label .lbl-icon {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}
.stat-value {
  font-family: var(--font-sans);
  font-size: 2rem;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -.02em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.stat-value.accent {
  background: linear-gradient(135deg, #7c5cff 0%, #22d3ee 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-sub {
  font-family: var(--font-mono);
  font-size: .72rem;
  color: var(--muted);
  margin-top: .55rem;
}

.chart-card {
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.chart-head {
  padding: 1.25rem 1.5rem;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border-glass);
  flex-wrap: wrap; gap: 1rem;
  background: rgba(255,255,255,.015);
}
.chart-title {
  font-family: var(--font-sans);
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: -.01em;
}
.chart-title em {
  font-style: normal;
  background: linear-gradient(135deg, #7c5cff 0%, #22d3ee 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
}
.chart-hint {
  font-family: var(--font-mono);
  font-size: .7rem;
  color: var(--muted);
  display: flex; align-items: center; gap: .5rem;
  padding: .3rem .7rem;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border-glass);
  border-radius: 999px;
}
.chart-hint::before { content: "⇄"; font-size: .9rem; color: var(--accent-2); }

.chart-scroll-wrap {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 1.5rem 1rem 1.25rem 1.5rem;
  scroll-behavior: smooth;
  position: relative;
}
.chart-scroll-wrap::-webkit-scrollbar { height: 10px; }
.chart-scroll-wrap::-webkit-scrollbar-track {
  background: rgba(255,255,255,.03);
  border-radius: 5px;
  margin: 0 1rem;
}
.chart-scroll-wrap::-webkit-scrollbar-thumb {
  background: linear-gradient(90deg, #7c5cff, #22d3ee);
  border-radius: 5px;
  opacity: .7;
}
.chart-scroll-wrap::-webkit-scrollbar-thumb:hover { opacity: 1; }
.chart-canvas-holder {
  height: 340px;
  position: relative;
}

.model-legend {
  display: flex; flex-wrap: wrap; gap: .5rem;
  padding: 1rem 1.5rem 1.25rem;
  border-top: 1px solid var(--border-glass);
  background: rgba(255,255,255,.015);
}
.legend-item {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .4rem .8rem;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border-glass);
  border-radius: 999px;
  font-size: .78rem;
  font-family: var(--font-mono);
  color: var(--ink-2);
  transition: all .2s;
}
.legend-item:hover {
  background: rgba(255,255,255,.08);
  border-color: var(--border-glass-strong);
}
.legend-swatch {
  width: 10px; height: 10px; border-radius: 3px;
  box-shadow: 0 0 8px currentColor;
}

.breakdown-card {
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.breakdown-head {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border-glass);
  background: rgba(255,255,255,.015);
}
.breakdown-title {
  font-family: var(--font-sans);
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -.01em;
}
.breakdown-title em {
  font-style: normal;
  background: linear-gradient(135deg, #7c5cff 0%, #22d3ee 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
}
.breakdown-table-wrap { overflow-x: auto; }
.breakdown-table { width: 100%; border-collapse: collapse; min-width: 720px; }
.breakdown-table th {
  text-align: left;
  padding: .8rem 1.5rem;
  font-family: var(--font-mono);
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  border-bottom: 1px solid var(--border-glass);
  background: rgba(255,255,255,.02);
}
.breakdown-table td {
  padding: .9rem 1.5rem;
  font-size: .88rem;
  border-bottom: 1px solid var(--border-glass);
  font-variant-numeric: tabular-nums;
  color: var(--ink-2);
}
.breakdown-table tr:last-child td { border-bottom: none; }
.breakdown-table tr:hover td { background: rgba(255,255,255,.02); color: var(--ink); }
.breakdown-table .right { text-align: right; font-family: var(--font-mono); }
.breakdown-table .model-cell {
  display: flex; align-items: center; gap: .6rem;
  font-weight: 500;
  color: var(--ink);
}
.model-dot {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.bar-cell { min-width: 140px; }
.bar-fill {
  height: 4px;
  background: rgba(255,255,255,.05);
  border-radius: 2px;
  overflow: hidden;
  margin-top: .35rem;
}
.bar-fill-inner {
  height: 100%;
  border-radius: 2px;
  box-shadow: 0 0 6px currentColor;
}

.empty {
  padding: 4rem 2rem;
  text-align: center;
  color: var(--muted);
}
.empty-icon {
  font-size: 3rem;
  font-weight: 200;
  color: var(--border-glass-strong);
  margin-bottom: 1rem;
  font-family: var(--font-mono);
}
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(5,6,10,.8);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(20px);
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 48px; height: 48px;
  border: 2px solid rgba(255,255,255,.08);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  box-shadow: 0 0 20px var(--accent-glow);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  margin-top: 1.25rem;
  font-family: var(--font-sans);
  font-size: .92rem;
  color: var(--ink);
  font-weight: 500;
}
.loading-detail {
  margin-top: .4rem;
  font-family: var(--font-mono);
  font-size: .75rem;
  color: var(--muted);
}

@media (max-width: 700px) {
  .wrap { padding: 1.25rem 1rem 3rem; }
  .masthead { flex-direction: column; align-items: flex-start; padding: 1.25rem; }
  .meta-block { align-items: flex-start; }
  .ctrl input, .ctrl select { min-width: 120px; flex: 1; }
  .ctrl { flex: 1 1 45%; }
  .stat-value { font-size: 1.6rem; }
  .chart-canvas-holder { height: 300px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="loading-overlay hidden" id="loader">
  <div class="spinner"></div>
  <div class="loading-label" id="loadLabel">Consultando VoiceFlow…</div>
  <div class="loading-detail" id="loadDetail"></div>
</div>

<div class="wrap">

  <header class="masthead glass">
    <div class="title-block">
      <div class="eyebrow"><span class="eyebrow-dot"></span>Gnius · analytics</div>
      <h1>Créditos <em>diarios</em> por Xolo</h1>
      <div class="sub">Histórico de consumo LLM día por día para cada grado. Consulta el endpoint <code>credit_usage</code> de VoiceFlow y lo agrupa por fecha y modelo.</div>
    </div>
    <div class="meta-block">
      <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Listo</span></div>
      <div id="dateRangeLabel">—</div>
    </div>
  </header>

  <section class="controls glass">
    <div class="ctrl">
      <label>Desde</label>
      <input type="date" id="startDate">
    </div>
    <div class="ctrl">
      <label>Hasta</label>
      <input type="date" id="endDate">
    </div>
    <div class="ctrl">
      <label>Rango rápido</label>
      <select id="quickRange">
        <option value="30">Últimos 30 días</option>
        <option value="60">Últimos 60 días</option>
        <option value="90" selected>Últimos 90 días</option>
        <option value="180">Últimos 6 meses</option>
        <option value="365">Último año</option>
        <option value="custom">Personalizado</option>
      </select>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="btnLoad" onclick="loadAll()">Cargar datos</button>
    <button class="btn btn-ghost" onclick="exportCSV()">Exportar CSV</button>
  </section>

  <div class="tabs-container glass">
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="content">
    <div class="empty glass" style="margin-top: 0;">
      <div class="empty-icon">◌</div>
      <div>Selecciona un rango y presiona <strong style="color:var(--ink)">Cargar datos</strong></div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   CHART.JS LOADER — robust multi-strategy loader
   Handles CSP-restricted hosts (htmledit.squarefree.com,
   github.io with strict policies) by trying:
   1) Direct <script src> (fastest, works when CSP allows)
   2) fetch + eval via blob URL (works when script-src is permissive but direct hosts aren't whitelisted)
   3) fetch + new Function (works when blob: is allowed)
   ═══════════════════════════════════════════════ */
const CHART_CDNS = [
  "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.7/chart.umd.min.js",
  "https://unpkg.com/chart.js@4.4.7/dist/chart.umd.min.js",
];

let chartJsReady = null;

function waitForChart(timeoutMs = 4000) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    (function poll() {
      if (typeof window.Chart !== "undefined") return resolve();
      if (Date.now() - start > timeoutMs) return reject(new Error("timeout"));
      setTimeout(poll, 50);
    })();
  });
}

function loadViaScriptTag(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.async = false;
    s.crossOrigin = "anonymous";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("script tag error"));
    document.head.appendChild(s);
  }).then(() => waitForChart());
}

async function loadViaFetchBlob(url) {
  const res = await fetch(url, { mode: "cors" });
  if (!res.ok) throw new Error("fetch failed " + res.status);
  const code = await res.text();
  // Try blob URL first
  try {
    const blob = new Blob([code], { type: "application/javascript" });
    const blobUrl = URL.createObjectURL(blob);
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = blobUrl;
      s.onload = () => { URL.revokeObjectURL(blobUrl); resolve(); };
      s.onerror = () => { URL.revokeObjectURL(blobUrl); reject(new Error("blob script failed")); };
      document.head.appendChild(s);
    });
    await waitForChart();
    return;
  } catch (blobErr) {
    // Fallback: execute via new Function (bypasses script-src but needs 'unsafe-eval')
    try {
      new Function(code)();
      await waitForChart();
      return;
    } catch (evalErr) {
      throw new Error("blob + eval both failed");
    }
  }
}

function ensureChartJs() {
  if (typeof window.Chart !== "undefined") return Promise.resolve();
  if (chartJsReady) return chartJsReady;
  chartJsReady = (async () => {
    const errors = [];
    // Strategy 1: all CDNs via <script> tag
    for (const url of CHART_CDNS) {
      try { await loadViaScriptTag(url); return; }
      catch (e) { errors.push(`script:${url} → ${e.message}`); }
      if (typeof window.Chart !== "undefined") return;
    }
    // Strategy 2: all CDNs via fetch+blob (for CSP-restricted pages)
    for (const url of CHART_CDNS) {
      try { await loadViaFetchBlob(url); return; }
      catch (e) { errors.push(`blob:${url} → ${e.message}`); }
      if (typeof window.Chart !== "undefined") return;
    }
    throw new Error("Chart.js no pudo cargar. Detalles:\n" + errors.join("\n"));
  })();
  return chartJsReady;
}

// Kick off loading immediately
ensureChartJs().catch(err => console.error("[Chart.js loader]", err));

/* Conversion rate from VoiceFlow: 200 credits = $1 USD (self-serve),
   i.e. 1 credit = $0.005 USD. Confirmed in the public pricing config
   (formatDisplayValue does value / 200). */
const USD_PER_CREDIT = 0.005;

/* The VoiceFlow Analytics API's credit_usage endpoint returns `count` as
   RAW TOKENS for llm-input / llm-output rows, NOT credits. To get credits
   we multiply tokens × (modelRate / 1000) where modelRate comes from
   realtime-api.voiceflow.com/v1alpha1/estimation/config. Orchestration
   items (chat/voice/no-reply) are counted directly in credits. */
const PRICING_CONFIG_URL = "https://realtime-api.voiceflow.com/v1alpha1/estimation/config";

const MODEL_PALETTE = [
  "#7c5cff", "#22d3ee", "#10b981", "#fbbf24", "#f43f5e",
  "#f97316", "#a78bfa", "#06b6d4", "#84cc16", "#ec4899",
  "#14b8a6", "#eab308",
];

  rawByXolo: new Map(),
  modelColors: new Map(),
  dateRange: { start: null, end: null },
  activeTab: null,
  chart: null,
  // pricing[model] = { input: creditsPer1kTokens, output: creditsPer1kTokens }
  pricing: null,
  pricingLoaded: false,
};

/* ═══════════════════════════════════════════════
   PRICING
   ═══════════════════════════════════════════════ */
async function loadPricing() {
  if (STATE.pricingLoaded) return;
  try {
    const res = await fetch(PRICING_CONFIG_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    const pricing = {};
    (json?.config?.usage || []).forEach(item => {
      if (!item.item) return;
      if (item.category === "llm-input" || item.category === "llm-output") {
        if (!pricing[item.item]) pricing[item.item] = { input: 0, output: 0 };
        if (item.category === "llm-input") pricing[item.item].input = item.value || 0;
        else pricing[item.item].output = item.value || 0;
      }
    });
    STATE.pricing = pricing;
    STATE.pricingLoaded = true;
    console.log(`[Pricing] Loaded ${Object.keys(pricing).length} models`);
  } catch (err) {
    console.warn("[Pricing] Failed to load, falling back to raw tokens:", err);
    STATE.pricing = {};
    STATE.pricingLoaded = true;
  }
}

/* Normalize item → { category, modelKey }
   The credit_usage endpoint returns rows with possibly different shapes:
     - LLM rows: { type: "llm-input"|"llm-output", model: "claude-haiku-4-5-20251001", count: <tokens> }
     - Orchestration: { type: "interaction"|"audio"|"no-reply", count: <credits>, model: null }
     - Some rows may use `item` field instead of/alongside `model`.
   We normalize here so every consumer of the data uses the same shape. */
function classifyItem(item) {
  const type = (item.type || "").toLowerCase();
  const model = item.model || item.item || null;

  if (type === "llm-input" || type === "llm-output") {
    return { category: type, modelKey: model, isLLM: true };
  }
  // Orchestration categories — group them all into "chat"/"voice"/"other" for display
  if (type === "interaction" || type === "chat" || model === "interaction") {
    return { category: "chat", modelKey: "chat", isLLM: false };
  }
  if (type === "audio" || type === "voice" || model === "audio") {
    return { category: "voice", modelKey: "voice", isLLM: false };
  }
  if (type === "no-reply" || model === "no-reply") {
    return { category: "no-reply", modelKey: "no-reply", isLLM: false };
  }
  // Unknown — keep raw info, will log to console
  return { category: type || "unknown", modelKey: model || "unknown", isLLM: false };
}

/* Fuzzy-match a model name against the pricing config.
   API returns "claude-haiku-4-5-20251001" and pricing is keyed by the same string.
   But sometimes versions differ, so we try:
     1) exact match
     2) strip trailing -YYYYMMDD date suffix and retry
     3) prefix match */
function findModelRates(modelKey) {
  if (!STATE.pricing || !modelKey) return null;
  // Exact
  if (STATE.pricing[modelKey]) return STATE.pricing[modelKey];
  // Strip trailing date suffix (e.g. -20251001, -2025-10-01)
  const stripped = modelKey
    .replace(/-\d{8}$/, "")
    .replace(/-\d{4}-\d{2}-\d{2}$/, "");
  if (stripped !== modelKey && STATE.pricing[stripped]) return STATE.pricing[stripped];
  // Prefix match
  for (const key of Object.keys(STATE.pricing)) {
    if (key.startsWith(modelKey) || modelKey.startsWith(key)) return STATE.pricing[key];
  }
  return null;
}

/* Convert a credit_usage item to credits (fractional).
   - Orchestration rows: count is already credits, return as-is.
   - LLM rows: count is tokens, convert via pricing table.
   - If pricing missing for an LLM row, FALLBACK to treating count as credits
     (better to show something than nothing — and log it for diagnosis). */
const unknownModelsLog = new Set();
function itemToCredits(item) {
  const count = item.count || 0;
  if (count === 0) return 0;

  const { isLLM, modelKey, category } = classifyItem(item);

  if (!isLLM) return count; // orchestration/chat/voice — already credits

  const rates = findModelRates(modelKey);
  if (!rates) {
    // Log once per unknown model so we can see what's missing
    if (!unknownModelsLog.has(modelKey)) {
      unknownModelsLog.add(modelKey);
      console.warn(`[Pricing] No rate for model "${modelKey}" — using raw count as credits (fallback). Item sample:`, item);
    }
    return count; // fallback — treat as credits directly
  }
  const rate = category === "llm-input" ? rates.input : rates.output;
  return (count / 1000) * rate;
}

function itemToTokens(item) {
  const { isLLM } = classifyItem(item);
  return isLLM ? (item.count || 0) : 0;
}

/* Extract a YYYY-MM-DD date from an ISO timestamp IN THE USER'S LOCAL TIMEZONE.
   Previously we used `period.split("T")[0]` which gives UTC date — that caused
   a 1-day offset for users west of UTC (e.g. Mexico, UTC-6). */
function periodToLocalDay(period) {
  if (!period) return null;
  const d = new Date(period);
  if (isNaN(d.getTime())) return null;
  // Format as YYYY-MM-DD in local time
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

/* ═══════════════════════════════════════════════

const $ = id => document.getElementById(id);

function fmtNum(n, d = 0) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  if (d === 0) return Math.round(n).toLocaleString("en-US");
  return n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtDateShort(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("es-MX", { day: "2-digit", month: "short" });
}
function fmtWeekday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("es-MX", { weekday: "short" });
}
function setStatus(type, text) {
  $("statusDot").className = "dot" + (type ? " " + type : "");
  $("statusText").textContent = text;
}
function showLoader(lbl, detail) {
  $("loadLabel").textContent = lbl || "Cargando…";
  $("loadDetail").textContent = detail || "";
  $("loader").classList.remove("hidden");
}
function hideLoader() { $("loader").classList.add("hidden"); }

function enumerateDays(startStr, endStr) {
  const out = [];
  const s = new Date(startStr + "T00:00:00");
  const e = new Date(endStr + "T00:00:00");
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    out.push(d.toISOString().split("T")[0]);
  }
  return out;
}

function getModelColor(model) {
  if (!STATE.modelColors.has(model)) {
    const idx = STATE.modelColors.size % MODEL_PALETTE.length;
    STATE.modelColors.set(model, MODEL_PALETTE[idx]);
  }
  return STATE.modelColors.get(model);
}

/* ═══════════════════════════════════════════════
   FETCH
   ═══════════════════════════════════════════════ */
async function fetchPages(xolo, startTime, endTime) {
  const all = [];
  let cursor = null;
  let page = 0;
  while (page < 50) {
    const body = {
      data: {
        name: "credit_usage",
        filter: { projectID: xolo.id, startTime, endTime, limit: 500 }
      }
    };
    if (cursor) body.data.filter.cursor = cursor;

    const res = await fetch(`${PROXY_URL}/v2/query/usage`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": xolo.key },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => "");
      throw new Error(`HTTP ${res.status}: ${txt.slice(0, 150)}`);
    }
    const data = await res.json();
    const items = data?.result?.items || [];
    all.push(...items);
    cursor = data?.result?.cursor;
    if (!cursor || items.length === 0) break;
    page++;
  }
  return all;
}

async function loadAll() {
  const startDate = $("startDate").value;
  const endDate = $("endDate").value;
  if (!startDate || !endDate) { alert("Selecciona fechas"); return; }
  if (startDate > endDate) { alert("La fecha 'Desde' debe ser anterior a 'Hasta'"); return; }

  STATE.dateRange = { start: startDate, end: endDate };
  const startTime = new Date(startDate + "T00:00:00").toISOString();
  const endTime = new Date(endDate + "T23:59:59").toISOString();

  showLoader("Preparando…", "Cargando librería de gráficas");
  setStatus("load", "Cargando…");
  $("btnLoad").disabled = true;

  try {
    await ensureChartJs();
  } catch (err) {
    hideLoader();
    $("btnLoad").disabled = false;
    setStatus("err", "Error de librería");
    alert("No se pudo cargar Chart.js. Revisa la consola para detalles. Intenta en otro host (Netlify, Vercel, GitHub Pages raw) — algunos sandboxes bloquean CDNs.");
    return;
  }

  showLoader("Preparando…", "Cargando tarifas de modelos LLM");
  await loadPricing();

  STATE.rawByXolo.clear();
  STATE.modelColors.clear();

  const errors = [];

  try {
    for (let i = 0; i < XOLOS.length; i++) {
      const x = XOLOS[i];
      showLoader("Consultando VoiceFlow", `${i + 1}/${XOLOS.length} · Grado ${x.grade}°`);
      try {
        const items = await fetchPages(x, startTime, endTime);
        STATE.rawByXolo.set(x.grade, items);

        // Diagnostic: log the shape of the first item per xolo
        if (items.length > 0) {
          console.log(`[${x.name}] ${items.length} items. Sample:`, items[0]);
        }

        // Assign colors based on each item's classified modelKey (chat, voice, or LLM model name)
        const totals = new Map();
        items.forEach(it => {
          const { modelKey } = classifyItem(it);
          if (!modelKey) return;
          totals.set(modelKey, (totals.get(modelKey) || 0) + itemToCredits(it));
        });
        [...totals.entries()].sort((a, b) => b[1] - a[1]).forEach(([m]) => getModelColor(m));
      } catch (err) {
        console.error(`Error ${x.name}:`, err);
        errors.push(`${x.grade}°`);
        STATE.rawByXolo.set(x.grade, []);
      }
    }

    $("dateRangeLabel").textContent = `${fmtDateShort(startDate)} → ${fmtDateShort(endDate)}`;
    switchTab(STATE.activeTab || XOLOS[0].grade);
    setStatus(errors.length ? "err" : "", errors.length ? `Errores en: ${errors.join(", ")}` : "Datos cargados");
  } catch (err) {
    console.error(err);
    setStatus("err", "Error");
    alert("Error al cargar: " + err.message);
  } finally {
    hideLoader();
    $("btnLoad").disabled = false;
  }
}

function switchTab(grade) {
  STATE.activeTab = grade;
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", parseInt(t.dataset.grade) === grade);
  });
  renderXolo(grade);
}

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function renderXolo(grade) {
  const xolo = XOLOS.find(x => x.grade === grade);
  const items = STATE.rawByXolo.get(grade);
  const content = $("content");

  if (!items) {
    content.innerHTML = `<div class="empty glass"><div class="empty-icon">◌</div>Sin datos. Presiona <strong style="color:var(--ink)">Cargar datos</strong>.</div>`;
    return;
  }

  if (items.length === 0) {
    content.innerHTML = `
      <div class="empty glass">
        <div class="empty-icon">∅</div>
        <div><strong style="color:var(--ink)">${xolo.name}</strong> no reportó consumo en este rango.</div>
      </div>`;
    return;
  }

  const days = enumerateDays(STATE.dateRange.start, STATE.dateRange.end);
  const byDay = new Map();
  const byDayModel = new Map();
  const byModel = new Map();

  let debugTotalCredits = 0;
  let debugLLMCredits = 0;
  let debugOrchCredits = 0;

  items.forEach(it => {
    const day = periodToLocalDay(it.period);
    if (!day) return;
    const credits = itemToCredits(it);
    const tokens = itemToTokens(it);
    const { category, modelKey, isLLM } = classifyItem(it);

    byDay.set(day, (byDay.get(day) || 0) + credits);

    if (!byDayModel.has(day)) byDayModel.set(day, new Map());
    const dm = byDayModel.get(day);
    dm.set(modelKey, (dm.get(modelKey) || 0) + credits);

    if (!byModel.has(modelKey)) {
      byModel.set(modelKey, { inputCredits: 0, outputCredits: 0, inputTokens: 0, outputTokens: 0, total: 0, isLLM });
    }
    const mdata = byModel.get(modelKey);
    mdata.total += credits;
    if (category === "llm-input") {
      mdata.inputCredits += credits;
      mdata.inputTokens += tokens;
    } else if (category === "llm-output") {
      mdata.outputCredits += credits;
      mdata.outputTokens += tokens;
    }

    debugTotalCredits += credits;
    if (isLLM) debugLLMCredits += credits;
    else debugOrchCredits += credits;
  });

  console.log(`[${xolo.name}] Total: ${debugTotalCredits.toFixed(2)} créd ($${(debugTotalCredits * USD_PER_CREDIT).toFixed(2)}) — LLM: ${debugLLMCredits.toFixed(2)}, Orch: ${debugOrchCredits.toFixed(2)}. Models found: ${[...byModel.keys()].join(", ")}`);

  const dayValues = days.map(d => byDay.get(d) || 0);
  const activeDays = dayValues.filter(v => v > 0);
  const total = dayValues.reduce((a, b) => a + b, 0);
  const avg = activeDays.length ? total / activeDays.length : 0;
  const max = activeDays.length ? Math.max(...activeDays) : 0;
  const min = activeDays.length ? Math.min(...activeDays) : 0;

  let maxDay = null, minDay = null;
  days.forEach(d => {
    const v = byDay.get(d) || 0;
    if (v > 0) {
      if (maxDay === null || v > (byDay.get(maxDay) || 0)) maxDay = d;
      if (minDay === null || v < (byDay.get(minDay) || Infinity)) minDay = d;
    }
  });

  const sortedModels = [...byModel.entries()].sort((a, b) => b[1].total - a[1].total);

  const prettyLabel = m => {
    if (m === "chat") return "Chat Agent Hosting";
    if (m === "voice") return "Voice";
    if (m === "no-reply") return "No-Reply";
    return m;
  };

  const modelLegendHtml = sortedModels.map(([m]) => `
    <div class="legend-item">
      <span class="legend-swatch" style="background:${getModelColor(m)};color:${getModelColor(m)}"></span>${prettyLabel(m)}
    </div>
  `).join("");

  const breakdownHtml = sortedModels.map(([m, data]) => {
    const pct = total > 0 ? (data.total / total) * 100 : 0;
    const usd = data.total * USD_PER_CREDIT;
    const ratio = data.outputTokens > 0 ? (data.inputTokens / data.outputTokens).toFixed(1) + ":1" : "—";
    const isChat = m === "chat" || m === "voice" || m === "no-reply";
    const hasPricing = STATE.pricing && (STATE.pricing[m] || findModelRates(m));
    const modelLabel = isChat
      ? `<span style="text-transform:capitalize">${m === "chat" ? "Chat Agent Hosting" : m}</span>`
      : (hasPricing ? m : `${m} <span style="color:var(--gold);font-size:.75em" title="Modelo sin tarifa exacta — se usa valor crudo">≈</span>`);
    return `
      <tr>
        <td>
          <div class="model-cell">
            <span class="model-dot" style="background:${getModelColor(m)};color:${getModelColor(m)}"></span>${modelLabel}
          </div>
        </td>
        <td class="right">${isChat ? "—" : fmtNum(data.inputTokens)}</td>
        <td class="right">${isChat ? "—" : fmtNum(data.outputTokens)}</td>
        <td class="right">${isChat ? "—" : ratio}</td>
        <td class="right"><strong style="color:var(--ink)">$${fmtNum(usd, 2)}</strong></td>
        <td class="bar-cell">
          <div style="color:var(--ink)">${pct.toFixed(1)}%</div>
          <div class="bar-fill"><div class="bar-fill-inner" style="width:${pct}%;background:${getModelColor(m)};color:${getModelColor(m)}"></div></div>
        </td>
      </tr>`;
  }).join("");

  const totalUSD = total * USD_PER_CREDIT;
  const avgUSD = avg * USD_PER_CREDIT;
  const maxUSD = max * USD_PER_CREDIT;
  const minUSD = min * USD_PER_CREDIT;

  content.innerHTML = `
    <section class="stats">
      <div class="stat glass">
        <div class="stat-label"><span class="lbl-icon"></span>Total del Rango</div>
        <div class="stat-value accent">$${fmtNum(totalUSD, 2)}</div>
        <div class="stat-sub">${activeDays.length} días con uso en ${days.length} días</div>
      </div>
      <div class="stat glass">
        <div class="stat-label"><span class="lbl-icon" style="background:var(--accent-2);box-shadow:0 0 6px var(--accent-2)"></span>Media Diaria</div>
        <div class="stat-value">$${fmtNum(avgUSD, 2)}</div>
        <div class="stat-sub">promedio sobre días con uso</div>
      </div>
      <div class="stat glass">
        <div class="stat-label"><span class="lbl-icon" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>Máximo</div>
        <div class="stat-value">$${fmtNum(maxUSD, 2)}</div>
        <div class="stat-sub">${maxDay ? fmtDateShort(maxDay) + " · " + fmtWeekday(maxDay) : "—"}</div>
      </div>
      <div class="stat glass">
        <div class="stat-label"><span class="lbl-icon" style="background:var(--rose);box-shadow:0 0 6px var(--rose)"></span>Mínimo</div>
        <div class="stat-value">$${fmtNum(minUSD, 2)}</div>
        <div class="stat-sub">${minDay ? fmtDateShort(minDay) + " · " + fmtWeekday(minDay) : "—"}</div>
      </div>
    </section>

    <div class="chart-card glass">
      <div class="chart-head">
        <div class="chart-title">${xolo.name} — consumo <em>diario</em> (USD)</div>
        <div class="chart-hint">scroll horizontal</div>
      </div>
      <div class="chart-scroll-wrap" id="chartScroll">
        <div class="chart-canvas-holder" id="chartHolder">
          <canvas id="dailyChart"></canvas>
        </div>
      </div>
      <div class="model-legend">${modelLegendHtml}</div>
    </div>

    <div class="breakdown-card glass">
      <div class="breakdown-head">
        <div class="breakdown-title">Desglose por <em>modelo</em></div>
      </div>
      <div class="breakdown-table-wrap">
        <table class="breakdown-table">
          <thead>
            <tr>
              <th>Modelo</th>
              <th class="right">Tokens Input</th>
              <th class="right">Tokens Output</th>
              <th class="right">Ratio I/O</th>
              <th class="right">USD</th>
              <th>Participación</th>
            </tr>
          </thead>
          <tbody>${breakdownHtml}</tbody>
        </table>
      </div>
    </div>
  `;

  renderDailyChart(days, byDayModel, sortedModels.map(([m]) => m));
}

function renderDailyChart(days, byDayModel, modelList) {
  if (typeof Chart === "undefined") {
    console.warn("Chart.js no está listo aún, reintentando…");
    ensureChartJs().then(() => renderDailyChart(days, byDayModel, modelList)).catch(err => {
      const holder = $("chartHolder");
      if (holder) holder.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--rose)">No se pudo cargar Chart.js: ${err.message}</div>`;
    });
    return;
  }

  const holder = $("chartHolder");
  const scroll = $("chartScroll");
  const perDay = 28;
  const minWidth = Math.max(days.length * perDay, scroll.clientWidth - 40);
  holder.style.width = minWidth + "px";

  const datasets = modelList.map(model => ({
    label: (model === "chat" ? "Chat Agent Hosting" : model === "voice" ? "Voice" : model === "no-reply" ? "No-Reply" : model),
    data: days.map(d => {
      const dm = byDayModel.get(d);
      const credits = dm ? (dm.get(model) || 0) : 0;
      return credits * USD_PER_CREDIT; // chart in USD
    }),
    backgroundColor: getModelColor(model) + "e6",
    borderColor: getModelColor(model),
    borderWidth: 0,
    borderRadius: 3,
    barPercentage: 0.85,
    categoryPercentage: 0.9,
  }));

  if (STATE.chart) { STATE.chart.destroy(); STATE.chart = null; }

  const ctx = $("dailyChart").getContext("2d");
  STATE.chart = new Chart(ctx, {
    type: "bar",
    data: { labels: days, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "rgba(10, 13, 20, 0.95)",
          titleColor: "#fff",
          bodyColor: "#a8b0c4",
          footerColor: "#e8ecf4",
          borderColor: "rgba(124, 92, 255, 0.4)",
          borderWidth: 1,
          padding: 14,
          cornerRadius: 10,
          displayColors: true,
          boxPadding: 6,
          titleFont: { family: "'Space Grotesk'", size: 13, weight: 600 },
          bodyFont: { family: "'JetBrains Mono'", size: 11 },
          footerFont: { family: "'Space Grotesk'", size: 12, weight: 600 },
          callbacks: {
            title: items => {
              const d = items[0].label;
              return fmtWeekday(d) + ", " + fmtDateShort(d);
            },
            label: ctx => {
              if (ctx.raw === 0) return null;
              return ` ${ctx.dataset.label}: $${fmtNum(ctx.raw, 2)}`;
            },
            footer: items => {
              const sum = items.reduce((a, it) => a + it.raw, 0);
              if (sum === 0) return "Sin consumo";
              return `Total: $${fmtNum(sum, 2)} USD`;
            },
          },
        },
      },
      scales: {
        x: {
          stacked: true,
          ticks: {
            color: "#6a7390",
            font: { family: "'JetBrains Mono'", size: 10 },
            maxRotation: 0,
            autoSkip: false,
            callback: function(val) {
              const d = this.getLabelForValue(val);
              const dd = new Date(d + "T00:00:00");
              if (dd.getDate() === 1) {
                return dd.toLocaleDateString("es-MX", { month: "short" }).toUpperCase();
              }
              if (days.length > 60) {
                return dd.getDay() === 1 ? String(dd.getDate()) : "";
              }
              return String(dd.getDate());
            },
          },
          grid: { display: false },
          border: { color: "rgba(255,255,255,0.08)" },
        },
        y: {
          stacked: true,
          beginAtZero: true,
          ticks: {
            color: "#6a7390",
            font: { family: "'JetBrains Mono'", size: 10 },
            callback: v => "$" + fmtNum(v, 2),
          },
          grid: { color: "rgba(255,255,255,0.05)", drawTicks: false },
          border: { display: false },
        },
      },
    },
  });
}

/* ═══════════════════════════════════════════════
   CSV EXPORT
   ═══════════════════════════════════════════════ */
function exportCSV() {
  if (STATE.rawByXolo.size === 0) { alert("Carga datos primero"); return; }

  let csv = "Fecha,Día semana,Xolo,Modelo,Tipo,Tokens/Count,Créditos,USD\n";
  STATE.rawByXolo.forEach((items, grade) => {
    items.forEach(it => {
      const day = (it.period || "").split("T")[0];
      if (!day) return;
      const weekday = fmtWeekday(day);
      const credits = itemToCredits(it);
      const usd = credits * USD_PER_CREDIT;
      csv += `${day},${weekday},${grade}°,${it.model || ""},${it.type || ""},${it.count || 0},${credits.toFixed(6)},${usd.toFixed(6)}\n`;
    });
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `xolo-creditos-diarios-${STATE.dateRange.start}-a-${STATE.dateRange.end}.csv`;
  link.click();
}
</script>
